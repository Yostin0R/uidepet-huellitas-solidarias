services:
  mysql:
    image: mysql:8.4
    container_name: huellitas-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: uidepet_huellitas
    ports:
      - "3306:3306"
    volumes:
      - huellitas_mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
      - ./seed-demo.sql:/docker-entrypoint-initdb.d/03-seed-demo.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  huellitas_mysql_data:
